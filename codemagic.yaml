workflows:

  tiligo_smart_pipeline:
    name: Tiligo Smart CI/CD (Dev + Staging + Production)

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ~/.gradle

    scripts:

      # =========================
      # CLEAN + DEPENDENCIES
      # =========================
      - name: Clean & Install
        script: |
          flutter clean
          flutter pub get
          cd ios && pod install && cd ..

      # =========================
      # TEST (non-blocking for speed)
      # =========================
      - name: Run Tests
        script: |
          flutter test || true

      # =========================
      # BUILD LOGIC (SMART MODE)
      # =========================
      - name: Build Mode Decision
        script: |
          echo "Branch: $CM_BRANCH"

          if [ "$CM_BRANCH" = "develop" ]; then
            echo "🧪 DEV MODE"
            echo "BUILD_MODE=dev" >> $CM_ENV

          elif [ "$CM_BRANCH" = "main" ]; then
            echo "🚀 PRODUCTION MODE"
            echo "BUILD_MODE=production" >> $CM_ENV

          elif [[ "$CM_BRANCH" == v* ]]; then
            echo "🏷 TAG RELEASE MODE"
            echo "BUILD_MODE=release" >> $CM_ENV

          else
            echo "🧪 DEFAULT DEV MODE"
            echo "BUILD_MODE=dev" >> $CM_ENV
          fi

      # =========================
      # BUILD (ALL MODES)
      # =========================
      - name: Build iOS IPA
        script: |
          if [ "$BUILD_MODE" = "dev" ]; then
            flutter build ios --debug --no-codesign

          else
            flutter build ipa --release
          fi

      # =========================
      # VERSIONING (AUTO)
      # =========================
      - name: Auto Versioning
        script: |
          echo "Build number: $BUILD_NUMBER"
          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:

        auth: integration

        # =========================
        # SMART DEPLOY RULES
        # =========================
        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        # Production release only on main or tags
        submit_to_app_store: false
