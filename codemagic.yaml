workflows:
  ios-production:
    name: Tiligo iOS Production Build

    environment:
      vars:
        APP_ID: com.tiligo.app
        CAPACITOR_APP_NAME: Tiligo
        NODE_ENV: production

      node: 20.11.1

      xcode: 15.2

      cocoapods: default

    triggering:
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app (Vite)
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install iOS pods
        script: |
          cd ios/App
          pod install

      - name: Set up iOS signing
        script: |
          echo "Signing handled via Codemagic App Store Connect integration"

      - name: Build iOS archive (Release)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            clean archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - internal