workflows:
  ios-release:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: tiligo_asc
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add iOS platform
        script: npx cap add ios && npx cap sync ios
      - name: Create export options
        script: |
          cat > ios/App/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
          </dict>
          </plist>
          EOF
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update || pod install
          cd ../..
      - name: Build and sign IPA
        script: |
          cd ios/App
          ls -la *.xcworkspace 2>/dev/null || ls -la *.xcodeproj
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE="App.xcodeproj"
          fi
          echo "Using: $WORKSPACE"
          if [[ "$WORKSPACE" == *.xcworkspace ]]; then
            xcodebuild -workspace $WORKSPACE -scheme App -sdk iphoneos -configuration Release archive -archivePath ../../build/ios/archive/App.xcarchive DEVELOPMENT_TEAM=H4QUDPK7S3 CODE_SIGN_STYLE=Automatic -allowProvisioningUpdates
          else
            xcodebuild -project $WORKSPACE -scheme App -sdk iphoneos -configuration Release archive -archivePath ../../build/ios/archive/App.xcarchive DEVELOPMENT_TEAM=H4QUDPK7S3 CODE_SIGN_STYLE=Automatic -allowProvisioningUpdates
          fi
          xcodebuild -exportArchive -archivePath ../../build/ios/archive/App.xcarchive -exportPath ../../build/ios/ipa -exportOptionsPlist exportOptions.plist -allowProvisioningUpdates
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers