workflows:

  tiligo_smart_pipeline:
    name: Tiligo Smart CI/CD (Auto Detect + Production Ready)

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # LOCATE FLUTTER PROJECT ROOT (FIXES pubspec.yaml ERROR)
      # =========================================================
      - name: Locate Flutter Project
        script: |
          set -e

          echo "Searching for Flutter project root..."

          FLUTTER_DIR=$(dirname $(find . -name pubspec.yaml | head -n 1))

          if [ -z "$FLUTTER_DIR" ]; then
            echo "ERROR: pubspec.yaml not found anywhere in repo"
            exit 1
          fi

          echo "Flutter project found at: $FLUTTER_DIR"

          echo "FLUTTER_PROJECT_DIR=$FLUTTER_DIR" >> $CM_ENV

      # =========================================================
      # CLEAN + INSTALL
      # =========================================================
      - name: Clean & Install Dependencies
        script: |
          set -e

          cd $FLUTTER_PROJECT_DIR

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

      # =========================================================
      # TESTS (NON-BLOCKING)
      # =========================================================
      - name: Run Tests
        script: |
          set +e

          cd $FLUTTER_PROJECT_DIR
          flutter test

      # =========================================================
      # ANALYSIS (NON-BLOCKING)
      # =========================================================
      - name: Static Analysis
        script: |
          set +e

          cd $FLUTTER_PROJECT_DIR
          flutter analyze

      # =========================================================
      # BUILD MODE DETECTION
      # =========================================================
      - name: Detect Build Mode
        script: |
          set -e

          echo "Branch: $CM_BRANCH"

          if [ "$CM_BRANCH" = "develop" ]; then
            echo "BUILD_MODE=dev" >> $CM_ENV

          elif [ "$CM_BRANCH" = "main" ]; then
            echo "BUILD_MODE=prod" >> $CM_ENV

          else
            echo "BUILD_MODE=dev" >> $CM_ENV
          fi

      # =========================================================
      # BUILD IOS APP
      # =========================================================
      - name: Build iOS
        script: |
          set -e

          cd $FLUTTER_PROJECT_DIR

          if [ "$BUILD_MODE" = "dev" ]; then
            flutter build ios --debug --no-codesign
          else
            flutter build ipa --release
          fi

      # =========================================================
      # AUTO VERSIONING
      # =========================================================
      - name: Auto Versioning
        script: |
          set +e

          cd $FLUTTER_PROJECT_DIR/ios

          agvtool new-version -all $BUILD_NUMBER || true

    artifacts:
      - $FLUTTER_PROJECT_DIR/build/ios/ipa/*.ipa
      - $FLUTTER_PROJECT_DIR/build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:

        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false