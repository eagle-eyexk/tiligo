workflows:
  ios-release:
    name: iOS Release (Full Auto)
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Install npm dependencies
        script: |
          set -e
          npm ci --prefer-offline 2>&1 | tail -20

      - name: Install Capacitor packages
        script: |
          set -e
          npm install @capacitor/core@^7.0.0 @capacitor/cli@^7.0.0 @capacitor/app@^7.0.0 @capacitor/ios@^7.0.0 @capacitor/haptics@^7.0.0 @capacitor/keyboard@^7.0.0 @capacitor/status-bar@^7.0.0 --save 2>&1
          npx cap --version

      - name: Build web app
        script: |
          set -e
          npm run build 2>&1 | tail -30

      - name: Add iOS platform
        script: |
          set -e
          if [ ! -d "ios" ]; then npx cap add ios 2>&1; fi

      - name: Sync Capacitor to iOS
        script: |
          set -e
          npx cap sync ios 2>&1

      - name: Generate Podfile
        script: |
          set -e
          cd ios/App
          cat > generate_podfile.sh << 'SCRIPTEOF'
          #!/bin/bash
          PLUGINS=""
          for d in ../../node_modules/@capacitor/*/; do
            name=$(basename "$d")
            case "$name" in core|cli|ios|cordova) continue ;; esac
            if [ -f "$d/package.json" ]; then
              PLUGINS="${PLUGINS}  pod 'Capacitor${name^}', :path => '../../node_modules/@capacitor/${name}'\n"
            fi
          done
          cat > Podfile << 'PODEOF'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'
          
          platform :ios, '14.0'
          use_frameworks!
          
          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/cordova'
          PLACEHOLDER
          end
          
          target 'App' do
            capacitor_pods
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          PODEOF
          sed -i '' "/PLACEHOLDER/c\\
          $(echo -e "$PLUGINS")" Podfile
          SCRIPTEOF
          chmod +x generate_podfile.sh
          ./generate_podfile.sh
          echo "=== Podfile ==="
          cat Podfile

      - name: Clean pod artifacts
        script: |
          set -e
          cd ios/App
          rm -rf Pods Podfile.lock
          pod deintegrate 2>/dev/null || true

      - name: Install CocoaPods
        script: |
          set -e
          cd ios/App
          gem install cocoapods --no-document 2>&1 | tail -3
          pod install --repo-update 2>&1 | tee pod_install.log
          if grep -qiE "error|failed|\[!\]" pod_install.log; then
            grep -iE "error|failed|\[!\]" pod_install.log
            exit 1
          fi

      - name: Verify workspace
        script: |
          set -e
          test -d ios/App/App.xcworkspace || (echo "FATAL: No workspace"; ls ios/App/; exit 1)

      - name: Set build number
        script: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist 2>/dev/null || true

      - name: Archive
        script: |
          set -e
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive 2>&1 | tail -30
          test -d build/App.xcarchive || (echo "FATAL: No archive"; exit 1)

      - name: Export IPA
        script: |
          set -e
          if [ ! -f ios/App/ExportOptions.plist ]; then
            cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
          </dict>
          </plist>
          PLIST
            EXPORT_OPTS="ExportOptions.plist"
          else
            EXPORT_OPTS="ios/App/ExportOptions.plist"
          fi
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build -exportOptionsPlist "$EXPORT_OPTS" 2>&1 | tail -10

    artifacts:
      - build/*.xcarchive
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_testflight: true
        submit_to_app_store: false