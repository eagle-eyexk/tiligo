workflows:

  tiligo_zero_touch_ios:
    name: Tiligo Zero-Touch iOS Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

      # 🚀 THIS ENABLES FULL AUTOMATIC SIGNING
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    scripts:

      # =====================================================
      # 1. PROJECT VALIDATION (NO AUTO MAGIC)
      # =====================================================
      - name: Validate Project
        script: |
          set -e

          if [ ! -f pubspec.yaml ]; then
            echo "❌ Missing Flutter project root"
            exit 1
          fi

      # =====================================================
      # 2. DEPENDENCIES
      # =====================================================
      - name: Install Dependencies
        script: |
          set -e
          flutter clean
          flutter pub get

      # =====================================================
      # 3. iOS BUILD PREP
      # =====================================================
      - name: iOS Setup
        script: |
          set -e

          if [ ! -d ios ]; then
            echo "❌ ios folder missing. Commit flutter create output first."
            exit 1
          fi

          cd ios
          pod install
          cd ..

      # =====================================================
      # 4. BUILD
      # =====================================================
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:

      # 🚀 ZERO PROVISIONING = CODEMAGIC HANDLES EVERYTHING
      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
