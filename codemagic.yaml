workflows:

  # =========================
  # 🧪 DEV BUILD
  # =========================
  dev:
    name: Tiligo Dev Build

    environment:
      flutter: stable
      xcode: latest

    triggering:
      branch_patterns:
        - pattern: develop
          include: true

    scripts:
      - flutter pub get
      - flutter build ios --debug --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app


  # =========================
  # 🧪 STAGING (TESTFLIGHT)
  # =========================
  staging:
    name: Tiligo Staging (TestFlight)

    max_build_duration: 90

    environment:
      flutter: stable
      xcode: latest

    triggering:
      branch_patterns:
        - pattern: develop
          include: true

    scripts:
      - flutter clean
      - flutter pub get

      - cd ios && pod install && cd ..

      - flutter test || true

      - flutter build ipa --release

      - chmod +x scripts/versioning.sh
      - ./scripts/versioning.sh

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers


  # =========================
  # 🚀 PRODUCTION (APP STORE)
  # =========================
  production:
    name: Tiligo Production Release

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    triggering:
      branch_patterns:
        - pattern: main
          include: true

        - pattern: "v*"
          include: true

    scripts:
      - flutter clean
      - flutter pub get

      - cd ios && pod install && cd ..

      - flutter test || true

      - flutter build ipa --release

      - chmod +x scripts/versioning.sh
      - ./scripts/versioning.sh

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
