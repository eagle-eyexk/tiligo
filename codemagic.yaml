workflows:
  ios_release:
    name: iOS Release Build

    instance_type: mac_mini_m2

    environment:
      flutter: stable

      vars:
        BUNDLE_ID: "com.base44.69d519273be8cf966434f77a.app"

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Clean build
        script: |
          flutter clean

      - name: Build iOS IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
