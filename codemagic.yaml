workflows:
  ios-release:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: tiligo_asc
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add iOS platform
        script: npx cap add ios && npx cap sync ios
      - name: Create export options
        script: |
          cat > ios/App/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
          </dict>
          </plist>
          EOF
      - name: Install CocoaPods
        script: |
          cd ios/App
          if [ ! -f Podfile ]; then
            pod init
            echo "platform :ios, '13.0'" > Podfile
            echo "target 'App' do" >> Podfile
            echo "  use_frameworks!" >> Podfile
            echo "  pod 'Capacitor'" >> Podfile
            echo "  pod 'CapacitorCordova'" >> Podfile
            echo "end" >> Podfile
          fi
          pod install --repo-update || pod install
          cd ../..
      - name: Build and sign IPA
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath ../../build/ios/archive/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates
          xcodebuild -exportArchive \
            -archivePath ../../build/ios/archive/App.xcarchive \
            -exportPath ../../build/ios/ipa \
            -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers