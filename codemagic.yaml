workflows:

  tiligo_autonomous_engine:
    name: Tiligo Autonomous CI/CD Engine

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # 1. REPOSITORY INTELLIGENCE SCAN
      # =========================================================
      - name: Repository Intelligence Scan
        script: |
          set -e

          echo "🧠 Scanning repository..."

          echo ""
          echo "Full structure:"
          ls -R .

          echo ""
          echo "Searching for Flutter project..."
          FLUTTER_PATH=$(find . -name pubspec.yaml | head -n 1)

          if [ -z "$FLUTTER_PATH" ]; then
            echo ""
            echo "⚠️ No Flutter project detected"

            echo ""
            echo "Checking if Flutter can be initialized..."

            if [ -f "README.md" ]; then
              echo "Repo exists but no Flutter app found."
              echo "Stopping safely."
            fi

            echo ""
            echo "❌ EXIT: This repository is not a Flutter application"
            exit 1
          fi

          FLUTTER_DIR=$(dirname "$FLUTTER_PATH")
          echo "FLUTTER_DIR=$FLUTTER_DIR" >> $CM_ENV

          echo "✅ Flutter project found at: $FLUTTER_DIR"

      # =========================================================
      # 2. CLEAN + DEPENDENCIES
      # =========================================================
      - name: Setup Flutter Project
        script: |
          set -e

          cd $FLUTTER_DIR

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

      # =========================================================
      # 3. TESTING LAYER
      # =========================================================
      - name: Run Tests
        script: |
          set +e
          cd $FLUTTER_DIR
          flutter test

      # =========================================================
      # 4. STATIC ANALYSIS
      # =========================================================
      - name: Code Analysis
        script: |
          set +e
          cd $FLUTTER_DIR
          flutter analyze

      # =========================================================
      # 5. BUILD MODE ENGINE
      # =========================================================
      - name: Determine Build Mode
        script: |
          set -e

          if [ "$CM_BRANCH" = "main" ]; then
            echo "BUILD_MODE=production" >> $CM_ENV
          else
            echo "BUILD_MODE=development" >> $CM_ENV
          fi

          echo "Mode: $BUILD_MODE"

      # =========================================================
      # 6. BUILD ENGINE
      # =========================================================
      - name: Build Application
        script: |
          set -e

          cd $FLUTTER_DIR

          if [ "$BUILD_MODE" = "development" ]; then
            flutter build ios --debug --no-codesign
          else
            flutter build ipa --release
          fi

      # =========================================================
      # 7. VERSIONING ENGINE
      # =========================================================
      - name: Auto Versioning
        script: |
          set +e

          cd $FLUTTER_DIR/ios
          agvtool new-version -all $BUILD_NUMBER || true

    artifacts:
      - $FLUTTER_DIR/build/ios/ipa/*.ipa
      - $FLUTTER_DIR/build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
