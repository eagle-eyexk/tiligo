workflows:
  tiligo-ios:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      vars:
        NODE_VERSION: "22"
        XCODE_VERSION: "16.1"
      node: $NODE_VERSION
      xcode: $XCODE_VERSION
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          echo 'export PATH="/opt/homebrew/opt/node@22/bin:$PATH"' >> ~/.bash_profile
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          node --version

      - name: Install deps
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm install

      - name: Build web
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm run build

      - name: Setup iOS
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          rm -rf ios/
          npx cap add ios
          npx cap sync ios

      - name: Create export options
        script: |
          cat > ios/App/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
          </dict>
          </plist>
          PLIST

      - name: Build and Export IPA
        script: |
          cd ios/App
          
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="H4QUDPK7S3" \
            2>&1 | tee /tmp/build.log
          
          echo "=== Build exit code: $? ==="
          
          if [ -d "/tmp/App.xcarchive" ]; then
            echo "=== Archive created ==="
            
            mkdir -p /tmp/ipa
            
            xcodebuild \
              -exportArchive \
              -archivePath /tmp/App.xcarchive \
              -exportPath /tmp/ipa \
              -exportOptionsPlist exportOptions.plist
            
            echo "=== IPA files ==="
            ls -la /tmp/ipa/
            
            mkdir -p $FCI_BUILD_DIR/build/ios/ipa
            cp /tmp/ipa/*.ipa $FCI_BUILD_DIR/build/ios/ipa/ 2>/dev/null || true
          else
            echo "=== Archive failed. Build log: ==="
            tail -50 /tmp/build.log
            exit 1
          fi
          
          cd ../..
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY
        key_id: "2H8MJ5ZP26"
        issuer_id: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
        submit_to_testflight: true
      
      email:
        recipients:
          - agentextern@gmail.com
        notify:
          success: true
          failure: true
