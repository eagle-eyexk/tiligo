workflows:
  ios-production:
    name: TiliGo iOS Production Pipeline

    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.tiligo.tiligo"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUILD_DIR: "$CM_BUILD_DIR/build"
        ARCHIVE_PATH: "$CM_BUILD_DIR/App.xcarchive"

      groups:
        - code-signing

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ios/App/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      # -----------------------------------
      # 1. Install dependencies (deterministic)
      # -----------------------------------
      - name: Install Node dependencies
        script: |
          npm ci --prefer-offline --no-audit

      # -----------------------------------
      # 2. Build web layer
      # -----------------------------------
      - name: Build web application
        script: |
          npm run build

      # -----------------------------------
      # 3. Reset Capacitor iOS (fixes broken builds)
      # -----------------------------------
      - name: Reset Capacitor iOS project
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          npx cap copy ios

      # -----------------------------------
      # 4. Install CocoaPods
      # -----------------------------------
      - name: Install Pods
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..

      # -----------------------------------
      # 5. Validate Xcode workspace integrity
      # -----------------------------------
      - name: Validate Xcode setup
        script: |
          xcodebuild -list -workspace ios/App/App.xcworkspace

      # -----------------------------------
      # 6. Clean + Archive (mandatory step)
      # -----------------------------------
      - name: Build iOS Archive
        script: |
          xcodebuild clean \
            -workspace ios/App/App.xcworkspace \
            -scheme App

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $ARCHIVE_PATH \
            CODE_SIGN_STYLE=Automatic

      # -----------------------------------
      # 7. Export IPA (App Store build)
      # -----------------------------------
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $ARCHIVE_PATH \
            -exportPath $BUILD_DIR \
            -exportOptionsPlist ios/App/exportOptions.plist

      # -----------------------------------
      # 8. HARD VALIDATION (prevents fake green builds)
      # -----------------------------------
      - name: Validate IPA output
        script: |
          echo "Checking build output..."

          IPA=$(find $BUILD_DIR -name "*.ipa" | head -n 1)

          if [ -z "$IPA" ]; then
            echo "BUILD FAILED: IPA not generated"
            exit 1
          fi

          echo "IPA generated successfully: $IPA"

    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - internal
