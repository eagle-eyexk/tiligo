workflows:
  ios-release:
    name: TiliGo iOS Release
    max_build_duration: 90

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    scripts:
      - flutter pub get

      - name: Pods install
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key:
          key_id: "2B6Y97523V"
          issuer_id: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
          key: |
            -----BEGIN PRIVATE KEY-----
            PASTE_CONTENT_OF_AuthKey_2B6Y97523V.p8
            -----END PRIVATE KEY-----
