workflows:
  ios-app-store:
    name: TiliGo iOS App Store Build

    max_build_duration: 120

    environment:
      xcode: latest
      cocoapods: default
      node: 20.0.0

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6771979690"

        APP_STORE_CONNECT_API_KEY_JSON:
          encrypted: true

    cache:
      cache_paths:
        - ~/.npm
        - ~/.cocoapods
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Setup App Store Connect API Key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys

          cat > ~/.appstoreconnect/private_keys/AuthKey.json <<EOF
          $APP_STORE_CONNECT_API_KEY_JSON
          EOF

      - name: Configure code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa 
            --workspace "$XCODE_WORKSPACE" 
            --scheme "$XCODE_SCHEME"

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find build/ios/ipa -name ".ipa" | head -1)

          echo "Uploading $IPA_PATH"

          xcrun altool 
            --upload-app 
            --type ios 
            --file "$IPA_PATH" 
            --apiKey "7GD5Z5D4G7" 
            --apiIssuer "6d7acece-2356-43c3-9946-6fd2cda5bf7d"

    artifacts:
      - build/ios/ipa/.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
