workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm ci --prefer-offline 2>&1 | tail -10
          npm install @capacitor/core@^7.0.0 @capacitor/cli@^7.0.0 @capacitor/app@^7.0.0 @capacitor/ios@^7.0.0 @capacitor/haptics@^7.0.0 @capacitor/keyboard@^7.0.0 @capacitor/status-bar@^7.0.0 --save 2>&1 | tail -5

      - name: Build and sync
        script: |
          set -e
          npm run build 2>&1 | tail -10
          if [ ! -d "ios" ]; then npx cap add ios 2>&1; fi
          npx cap sync ios 2>&1

      - name: Pod install
        script: |
          set -e
          cd ios/App
          pod install --repo-update 2>&1 | tail -15

      - name: Set build number
        script: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist 2>/dev/null || true

      - name: Archive
        script: |
          set -e
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=H4QUDPK7S3 PROVISIONING_PROFILE_SPECIFIER="Tili Distribution" archive 2>&1 | grep -E "error:|ARCHIVE SUCCEEDED|FAILED"
          test -d build/App.xcarchive || (echo "FATAL"; exit 1)

      - name: Export IPA
        script: |
          set -e
          cat > ExportOptions.plist << 'X'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.tiligo.app</key>
                  <string>Tili Distribution</string>
              </dict>
          </dict>
          </plist>
          X
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist 2>&1 | tail -5

    artifacts:
      - build/*.xcarchive
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_testflight: true
        submit_to_app_store: false
