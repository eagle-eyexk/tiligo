workflows:
  ios-release:
    name: iOS Release (Capacitor Clean Build)

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Ensure Capacitor packages
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/app

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor (iOS clean)
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS app (Release)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            archive

    artifacts:
      - build/*.xcarchive
      - ios/App/build/**/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_testflight: true
        submit_to_app_store: false