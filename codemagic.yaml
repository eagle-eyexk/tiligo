scripts:

  - name: Clean signing conflict state
    script: |
      echo "Removing local signing artifacts (CRITICAL)"
      rm -rf signing || true
      rm -rf ios/App/*.mobileprovision || true

  - name: Force automatic signing mode
    script: |
      export DEVELOPMENT_TEAM=RR98G82857

  - name: Archive (single source of truth signing)
    script: |
      xcodebuild clean \
        -workspace ios/App/App.xcworkspace \
        -scheme App

      xcodebuild archive \
        -workspace ios/App/App.xcworkspace \
        -scheme App \
        -configuration Release \
        -archivePath $CM_BUILD_DIR/App.xcarchive \
        CODE_SIGN_STYLE=Automatic \
        DEVELOPMENT_TEAM=RR98G82857 \
        -allowProvisioningUpdates
