workflows:

  tiligo_self_healing_pipeline:
    name: Tiligo Self-Healing CI/CD Engine

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # 1. SELF-HEALING PROJECT RECOVERY ENGINE
      # =========================================================
      - name: Self-Healing Recovery
        script: |
          set -e

          echo "🧠 Starting self-healing system..."

          # CASE 1: No Flutter project at all
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml missing → initializing Flutter project..."

            flutter create . --platforms=ios,android
          fi

          # CASE 2: Broken iOS structure
          if [ ! -d ios ] || [ ! -f ios/Podfile ]; then
            echo "⚠️ iOS project broken → regenerating ios..."

            rm -rf ios
            flutter create . --platforms=ios
          fi

          # CASE 3: Broken Android structure
          if [ ! -d android ]; then
            echo "⚠️ Android missing → regenerating android..."
            flutter create . --platforms=android
          fi

          echo "✅ Self-healing complete"

      # =========================================================
      # 2. CLEAN BUILD STATE
      # =========================================================
      - name: Clean Project
        script: |
          set -e

          flutter clean
          flutter pub get

      # =========================================================
      # 3. iOS DEPENDENCIES FIX
      # =========================================================
      - name: Fix CocoaPods
        script: |
          set -e

          cd ios
          pod install
          cd ..

      # =========================================================
      # 4. QUALITY CHECKS (NON-BLOCKING)
      # =========================================================
      - name: Analyze Code
        script: |
          set +e
          flutter analyze

      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # 5. BUILD ENGINE
      # =========================================================
      - name: Build iOS App
        script: |
          set -e

          if [ "$CM_BRANCH" = "main" ]; then
            echo "🚀 Production build"
            flutter build ipa --release
          else
            echo "🧪 Development build"
            flutter build ios --debug --no-codesign
          fi

      # =========================================================
      # 6. AUTO VERSIONING
      # =========================================================
      - name: Versioning
        script: |
          set +e

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
