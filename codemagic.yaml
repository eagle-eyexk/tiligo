workflows:

  tiligo_ios:
    name: Tiligo iOS Stable Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    scripts:

      # =====================================================
      # VALIDATE PROJECT
      # =====================================================
      - name: Validate Project
        script: |
          set -e
          if [ ! -f pubspec.yaml ]; then
            echo "❌ Missing Flutter project root"
            exit 1
          fi

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================
      - name: Flutter Dependencies
        script: |
          set -e
          flutter clean
          flutter pub get

      # =====================================================
      # iOS PODS
      # =====================================================
      - name: Install CocoaPods
        script: |
          set -e

          if [ ! -d ios ]; then
            echo "❌ ios folder missing - commit flutter create output"
            exit 1
          fi

          cd ios
          pod install
          cd ..

      # =====================================================
      # BUILD
      # =====================================================
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: falsepod install
          cd ..

      # =====================================================
      # 4. BUILD
      # =====================================================
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:

      # 🚀 ZERO PROVISIONING = CODEMAGIC HANDLES EVERYTHING
      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
