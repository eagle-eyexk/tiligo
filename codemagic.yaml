workflows:
  ios-app-store:
    name: iOS App Store
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app
      groups:
        - app_store_connect_api
      node: 20
      xcode: 15
    scripts:
      - name: Build app
        script: |
          npm ci
          npm run build
          npx cap sync ios
          xcode-project build-archive \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-path build/ios.xcarchive
          xcode-project export-ipa \
            --archive-path build/ios.xcarchive \
            --output-path build/tiligo.ipa
    artifacts:
      - build/tiligo.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL