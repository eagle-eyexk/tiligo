workflows:
  tiligo_ios:
    name: Tiligo iOS Production Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # VALIDATION STEP (prevents "no iOS project detected")
      # =========================================================
      - name: Validate Flutter Project
        script: |
          set -e
          echo "Checking project root..."
          ls

          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml missing" && exit 1)
          test -d ios || (echo "ERROR: ios folder missing" && exit 1)

      # =========================================================
      # DEPENDENCIES
      # =========================================================
      - name: Get Flutter Packages
        script: |
          set -e
          flutter pub get

      - name: Clean Build
        script: |
          flutter clean

      # =========================================================
      # iOS DEPENDENCIES (COCOAPODS)
      # =========================================================
      - name: Install CocoaPods Dependencies
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..

      # =========================================================
      # TESTS (non-blocking)
      # =========================================================
      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # ANALYSIS (non-blocking)
      # =========================================================
      - name: Static Analysis
        script: |
          set +e
          flutter analyze

      # =========================================================
      # BUILD IPA
      # =========================================================
      - name: Build iOS IPA
        script: |
          set -e
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
