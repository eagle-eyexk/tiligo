workflows:
  ios-release:
    name: iOS Release (Capacitor)
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Install npm dependencies
        script: |
          set -e
          npm ci --prefer-offline 2>&1 | tail -20

      - name: Install Capacitor packages
        script: |
          set -e
          npm install @capacitor/core@^7.0.0 @capacitor/cli@^7.0.0 @capacitor/app@^7.0.0 @capacitor/ios@^7.0.0 @capacitor/haptics@^7.0.0 @capacitor/keyboard@^7.0.0 @capacitor/status-bar@^7.0.0 --save 2>&1
          npx cap --version

      - name: Build web app
        script: |
          set -e
          npm run build 2>&1 | tail -30

      - name: Add iOS platform
        script: |
          set -e
          if [ ! -d "ios" ]; then npx cap add ios 2>&1; fi

      - name: Sync Capacitor to iOS
        script: |
          set -e
          npx cap sync ios 2>&1

      - name: Generate Podfile
        script: |
          set -e
          cd ios/App
          cat > _gen_podfile.sh << 'X'
          #!/bin/bash
          P=""
          for d in ../../node_modules/@capacitor/*/; do
            n=$(basename "$d")
            case "$n" in core|cli|ios|cordova) continue ;; esac
            if [ -f "$d/package.json" ]; then
              P="${P}  pod 'Capacitor${n^}', :path => '../../node_modules/@capacitor/${n}'\n"
            fi
          done
          cat > Podfile << 'Y'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'
          platform :ios, '14.0'
          use_frameworks!
          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
          PLACEHOLDER
          end
          target 'App' do
            capacitor_pods
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
              end
            end
          end
          Y
          sed -i '' "/PLACEHOLDER/c\\
          $(echo -e "$P")" Podfile
          X
          chmod +x _gen_podfile.sh
          ./_gen_podfile.sh

      - name: Clean pod artifacts
        script: |
          set -e
          cd ios/App
          rm -rf Pods Podfile.lock
          pod deintegrate 2>/dev/null || true

      - name: Install CocoaPods
        script: |
          set -e
          cd ios/App
          gem install cocoapods --no-document 2>&1 | tail -3
          pod install --repo-update 2>&1 | tee _pod.log
          if grep -qi "no podspec found\|cannot find\|abort" _pod.log; then
            echo "=== FATAL POD ERRORS ==="
            grep -i "no podspec found\|cannot find\|abort" _pod.log
            exit 1
          fi
          echo "=== Pods installed ==="

      - name: Fix signing and duplicate frameworks
        script: |
          set -e
          cd ios/App
          cat > fix_build.sh << 'X'
          #!/bin/bash

          # 1. Set development team in build settings
          TEAM_ID="${APP_STORE_TEAM_ID:-${CM_APPLE_TEAM_ID}}"
          if [ -z "$TEAM_ID" ]; then
            echo "WARNING: No team ID found. Checking Apple credentials..."
            TEAM_ID=$(grep -r "DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj | head -1 | sed 's/.*= //;s/;//')
          fi
          echo "Using Team ID: ${TEAM_ID:-not set}"

          # Set team in project.pbxproj
          if [ -n "$TEAM_ID" ]; then
            sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = \"$TEAM_ID\";/g" App.xcodeproj/project.pbxproj
            sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = \"$TEAM_ID\";/g" App.xcodeproj/project.pbxproj
          fi

          # 2. Remove duplicate framework references
          ruby -e '
          pbxproj = File.read("App.xcodeproj/project.pbxproj")
          # Remove duplicate PBXBuildFile entries for Capacitor and Cordova
          seen = {}
          new_lines = []
          pbxproj.each_line do |line|
            if line.include?("PBXBuildFile") && (line.include?("Capacitor") || line.include?("Cordova"))
              if seen[line]
                next
              else
                seen[line] = true
              end
            end
            new_lines << line
          end
          File.write("App.xcodeproj/project.pbxproj", new_lines.join)
          '
          echo "=== Build settings fixed ==="
          X
          chmod +x fix_build.sh
          ./fix_build.sh

      - name: Verify workspace
        script: |
          set -e
          test -d ios/App/App.xcworkspace || (echo "FATAL: No workspace"; exit 1)

      - name: Set build number
        script: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist 2>/dev/null || true

      - name: Archive
        script: |
          set -e
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive CODE_SIGN_STYLE=Auto DEVELOPMENT_TEAM="${APP_STORE_TEAM_ID}" archive 2>&1 | tail -40
          test -d build/App.xcarchive || (echo "FATAL: No archive"; exit 1)

      - name: Export IPA
        script: |
          set -e
          if [ ! -f ios/App/ExportOptions.plist ]; then
            cat > ExportOptions.plist << 'X'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
          </dict>
          </plist>
          X
            EXPORT_OPTS="ExportOptions.plist"
          else
            EXPORT_OPTS="ios/App/ExportOptions.plist"
          fi
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build -exportOptionsPlist "$EXPORT_OPTS" 2>&1 | tail -10

    artifacts:
      - build/*.xcarchive
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_testflight: true
        submit_to_app_store: false
