workflows:
  tiligo-production:
    name: Tiligo Production

    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tiligo_asc

    environment:
      flutter: stable

      vars:
        BUNDLE_ID: com.tili-go.app

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    scripts:
      - flutter pub get
      - flutter clean
      - cd ios && pod install && cd ..
      - flutter build appbundle --release
      - flutter build ipa --release

    artifacts:
      - build/**/outputs/**/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
