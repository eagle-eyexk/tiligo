workflows:
  ios-production:
    name: TiliGo iOS Stable Build

    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        TEAM_ID: "RR98G82857"
        BUNDLE_ID: "com.tiligo.tilgo"
        WORKSPACE: "ios/App/App.xcworkspace"
        SCHEME: "App"
        ARCHIVE_PATH: "$CM_BUILD_DIR/App.xcarchive"
        BUILD_DIR: "$CM_BUILD_DIR/build"

      groups:
        - code-signing

    cache:
      cache_paths:
        - node_modules
        - ~/.npm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      # =====================================================
      # 1. HARD RESET IOS (ELIMINATES CORRUPTION)
      # =====================================================
      - name: Rebuild iOS clean (critical fix)
        script: |
          echo "Deleting corrupted iOS project..."
          rm -rf ios

          echo "Recreating Capacitor iOS..."
          npx cap add ios
          npx cap sync ios
          npx cap copy ios

          echo "Validating project exists..."
          test -f ios/App/App.xcodeproj/project.pbxproj

      # =====================================================
      # 2. INSTALL DEPENDENCIES
      # =====================================================
      - name: Install dependencies
        script: |
          npm ci --prefer-offline --no-audit

      # =====================================================
      # 3. BUILD WEB
      # =====================================================
      - name: Build web app
        script: |
          npm run build

      # =====================================================
      # 4. POD INSTALL (RECOVERY SAFE)
      # =====================================================
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update || pod install
          cd ../..

      # =====================================================
      # 5. VALIDATE XCODE PROJECT INTEGRITY
      # =====================================================
      - name: Validate Xcode project integrity
        script: |
          echo "Checking workspace..."

          xcodebuild -list -workspace ios/App/App.xcworkspace

          echo "Checking scheme existence..."
          xcodebuild -list -workspace ios/App/App.xcworkspace | grep App

      # =====================================================
      # 6. FORCE CLEAN SIGNING MODE
      # =====================================================
      - name: Enforce signing environment
        script: |
          export DEVELOPMENT_TEAM=$TEAM_ID

      # =====================================================
      # 7. ARCHIVE (ONLY IF PROJECT IS VALID)
      # =====================================================
      - name: Build iOS archive (safe)
        script: |

          set -e

          xcodebuild clean \
            -workspace ios/App/App.xcworkspace \
            -scheme App

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $ARCHIVE_PATH \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID \
            -allowProvisioningUpdates

      # =====================================================
      # 8. EXPORT IPA
      # =====================================================
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $ARCHIVE_PATH \
            -exportPath $BUILD_DIR \
            -exportOptionsPlist ios/App/exportOptions.plist

      # =====================================================
      # 9. VALIDATE OUTPUT (NO FALSE SUCCESS)
      # =====================================================
      - name: Validate IPA output
        script: |
          IPA=$(find $BUILD_DIR -name "*.ipa" | head -n 1)

          if [ -z "$IPA" ]; then
            echo "BUILD FAILED: IPA NOT GENERATED"
            exit 1
          fi

          echo "SUCCESS: IPA GENERATED -> $IPA"

    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - internal
