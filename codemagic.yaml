workflows:

  tiligo_ios_autonomous:
    name: Tiligo iOS Autonomous Engine

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.base69d519273be8cf966434f77a.app

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    scripts:

      # =====================================================
      # FLUTTER + IOS AUTO SETUP
      # =====================================================
      - name: Bootstrap iOS Project
        script: |
          set -e

          cd $CM_BUILD_DIR

          echo "🧠 Checking Flutter project..."

          # Ensure Flutter project exists
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml missing"
            exit 1
          fi

          echo "📦 Installing dependencies..."
          flutter clean
          flutter pub get

          # Generate iOS if missing
          if [ ! -d ios ]; then
            echo "⚠️ ios folder missing → generating..."
            flutter create . --platforms=ios
          fi

          # Rebuild iOS module if Podfile missing
          if [ ! -f ios/Podfile ]; then
            echo "⚠️ Podfile missing → rebuilding iOS module..."

            rm -rf ios

            flutter create . --platforms=ios
          fi

          # Final validation
          if [ ! -f ios/Podfile ]; then
            echo "❌ Podfile generation failed"
            exit 1
          fi

          echo "🍫 Installing CocoaPods..."
          cd ios
          pod install
          cd ..

          echo "✅ iOS setup completed"

      # =====================================================
      # CODE ANALYSIS
      # =====================================================
      - name: Analyze Code
        script: |
          set +e
          flutter analyze

      # =====================================================
      # TESTS
      # =====================================================
      - name: Run Tests
        script: |
          set +e
          flutter test

      # =====================================================
      # AUTO VERSIONING
      # =====================================================
      - name: Auto Versioning
        script: |
          set +e

          cd ios

          agvtool new-version -all $BUILD_NUMBER || true

          cd ..

      # =====================================================
      # BUILD IPA
      # =====================================================
      - name: Build IPA
        script: |
          set -e

          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
