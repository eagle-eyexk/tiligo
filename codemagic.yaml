workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Install signing
        script: |
          set -e
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          
          # Codemagic stores profiles in this env path
          if [ -d "$CM_BUILD_DIR/../profiles" ]; then
            cp "$CM_BUILD_DIR"/../profiles/*.mobileprovision "$PROFILES_DIR/" 2>/dev/null || true
          fi
          
          # Also check the standard Codemagic profile location
          if [ -d "$HOME/Library/MobileDevice/Provisioning Profiles" ]; then
            echo "Profiles already present"
          fi
          
          # List what we have
          ls -la "$PROFILES_DIR/" 2>/dev/null || echo "No profiles directory"
          
          # Find any .mobileprovision anywhere
          find / -name "*.mobileprovision" -maxdepth 5 2>/dev/null | head -5
          find ~/Library -name "*.mobileprovision" 2>/dev/null | head -5

      - name: Install dependencies
        script: |
          set -e
          npm ci --prefer-offline 2>&1 | tail -10
          npm install @capacitor/core@^7.0.0 @capacitor/cli@^7.0.0 @capacitor/app@^7.0.0 @capacitor/ios@^7.0.0 @capacitor/haptics@^7.0.0 @capacitor/keyboard@^7.0.0 @capacitor/status-bar@^7.0.0 --save 2>&1 | tail -5

      - name: Build and sync
        script: |
          set -e
          npm run build 2>&1 | tail -10
          if [ ! -d "ios" ]; then npx cap add ios 2>&1; fi
          npx cap sync ios 2>&1

      - name: Pod install
        script: |
          set -e
          cd ios/App
          pod install --repo-update 2>&1 | tail -15

      - name: Set build number
        script: |
          BUILD=$(( $(date +%s) - 1700000000 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" ios/App/App/Info.plist 2>/dev/null || true

      - name: Archive
        script: |
          set -e
          PROFILE_UUID=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -exec grep -a -A1 "UUID" {} \; | grep -o '[A-F0-9]\{8\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{12\}' | head -1)
          echo "Profile UUID: ${PROFILE_UUID:-NOT FOUND}"
          
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive DEVELOPMENT_TEAM=H4QUDPK7S3 CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE="${PROFILE_UUID}" -allowProvisioningUpdates archive 2>&1 | grep -E "error:|ARCHIVE|SUCCEEDED|FAILED"
          test -d build/App.xcarchive || (echo "FATAL"; exit 1)
          echo "ARCHIVE SUCCEEDED"

      - name: Export IPA
        script: |
          set -e
          cat > ExportOptions.plist << 'X'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.tiligo.app</key>
                  <string>Tili Distribution</string>
              </dict>
          </dict>
          </plist>
          X
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist 2>&1 | tail -5

    artifacts:
      - build/*.xcarchive
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_testflight: true
        submit_to_app_store: false
