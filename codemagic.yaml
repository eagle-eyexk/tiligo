workflows:
  ios-release:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: tiligo_asc
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm run build
      - name: iOS Platform
        script: npx cap add ios && npx cap sync ios
      - name: Pod Install
        script: cd ios/App && pod install && cd ../..
      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath ../../build/ios/archive/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID 6d7acece-2356-43c3-9946-6fd2cda5bf7d \
            -authenticationKeyID 553BWFUTAM \
            -authenticationKeyPath $APP_STORE_CONNECT_PRIVATE_KEY
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers