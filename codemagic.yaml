workflows:

  tiligo_production_pipeline:
    name: Tiligo Production CI/CD

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # 1. VALIDATE PROJECT STRUCTURE (FAIL FAST)
      # =========================================================
      - name: Validate Flutter Project
        script: |
          set -e

          echo "🔍 Checking Flutter project structure..."

          if [ ! -f pubspec.yaml ]; then
            echo "❌ ERROR: pubspec.yaml not found"
            echo "👉 This repo is NOT a valid Flutter project root"
            exit 1
          fi

          if [ ! -d lib ]; then
            echo "❌ ERROR: lib/ folder missing"
            exit 1
          fi

          echo "✅ Flutter project detected"

      # =========================================================
      # 2. INSTALL DEPENDENCIES
      # =========================================================
      - name: Install Dependencies
        script: |
          set -e

          flutter clean
          flutter pub get

      # =========================================================
      # 3. iOS DEPENDENCIES (SAFE MODE)
      # =========================================================
      - name: Install CocoaPods
        script: |
          set -e

          if [ ! -d ios ]; then
            echo "❌ ERROR: ios/ folder missing (run flutter create locally)"
            exit 1
          fi

          if [ ! -f ios/Podfile ]; then
            echo "❌ ERROR: Podfile missing (ios project not generated correctly)"
            exit 1
          fi

          cd ios
          pod install
          cd ..

      # =========================================================
      # 4. CODE QUALITY
      # =========================================================
      - name: Analyze Code
        script: |
          set +e
          flutter analyze

      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # 5. BUILD
      # =========================================================
      - name: Build iOS App
        script: |
          set -e

          if [ "$CM_BRANCH" = "main" ]; then
            flutter build ipa --release
          else
            flutter build ios --debug --no-codesign
          fi

      # =========================================================
      # 6. VERSIONING
      # =========================================================
      - name: Versioning
        script: |
          set +e

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
