workflows:
  tiligo-ios:
    name: Tiligo TestFlight & App Store
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      vars:
        NODE_VERSION: "22"
        XCODE_VERSION: "16.1"
        APP_STORE_ID: "6777145744"
        BUNDLE_ID: "com.tili-go.tiligo"
        TEAM_ID: "H4QUDPK7S3"
      node: $NODE_VERSION
      xcode: $XCODE_VERSION
      groups:
        - tiligo_ios
    
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22 2>/dev/null || true
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          node --version
          npm --version

      - name: Install dependencies
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          rm -rf node_modules package-lock.json
          npm install
          npm install @capacitor/ios

      - name: Build web app
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm run build
          ls -la dist/

      - name: Setup iOS project
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          rm -rf ios/
          npx cap init "Tiligo" "com.tili-go.tiligo" --web-dir=dist --skip-appid-validation
          npx cap add ios
          npx cap sync ios
          echo "=== iOS project created ==="
          ls -la ios/App/

      - name: Build archive
        script: |
          cd ios/App
          
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="H4QUDPK7S3" \
            PROVISIONING_PROFILE_SPECIFIER="tiligo_ios" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -allowProvisioningUpdates \
            2>&1 | tail -30
          
          if [ -d "/tmp/App.xcarchive" ]; then
            echo "✅ Archive created"
          else
            echo "❌ Archive failed"
            exit 1
          fi
          
          cd ../..

      - name: Export IPA
        script: |
          cat > /tmp/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          PLIST
          
          mkdir -p /tmp/ipa
          mkdir -p build/ios/ipa
          
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/export.plist 2>&1 | tail -20
          
          if ls /tmp/ipa/*.ipa 1>/dev/null 2>&1; then
            cp /tmp/ipa/*.ipa build/ios/ipa/
            echo "✅ IPA exported:"
            ls -la build/ios/ipa/
          else
            echo "❌ IPA export failed"
            exit 1
          fi
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY
        key_id: "2H8MJ5ZP26"
        issuer_id: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
        submit_to_testflight: true
        submit_to_app_store: false
      
      email:
        recipients:
          - agentextern@gmail.com
        notify:
          success: true
          failure: true
