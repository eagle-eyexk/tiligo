workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: tiligo_asc
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - code-signing
    triggering:
      events: [push]
      branch_patterns: [{pattern: main}]
    scripts:
      - name: Install and build
        script: |
          npm ci --prefer-offline
          npm run build
      - name: Sync and pod install
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
          cd ios/App && pod install --repo-update && cd ../..
      - name: Install provisioning profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp signing/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Install certificate
        script: |
          security create-keychain -p build123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build123 build.keychain
          security import signing/distribution.cer -k build.keychain -A
          security import signing/tili_distribution.key -k build.keychain -A
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain
    artifacts:
      - /Users/builder/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
