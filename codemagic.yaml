workflows:
  ios-production:
    name: TiliGo iOS Production

    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.tiligo.tilgo"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        ARCHIVE_PATH: "$CM_BUILD_DIR/App.xcarchive"
        BUILD_DIR: "$CM_BUILD_DIR/build"
        APPLE_TEAM_ID: "RR98G82857"

      groups:
        - code-signing

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ios/App/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      # --------------------------------
      # 1. Install dependencies
      # --------------------------------
      - name: Install Node dependencies
        script: |
          npm ci --prefer-offline --no-audit

      # --------------------------------
      # 2. Build web app
      # --------------------------------
      - name: Build web app
        script: |
          npm run build

      # --------------------------------
      # 3. Clean Capacitor iOS (prevents broken Xcode state)
      # --------------------------------
      - name: Reset Capacitor iOS
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          npx cap copy ios

      # --------------------------------
      # 4. Install CocoaPods
      # --------------------------------
      - name: Install Pods
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..

      # --------------------------------
      # 5. FORCE SIGNING FIX (critical)
      # --------------------------------
      - name: Force iOS Signing Team
        script: |
          cd ios/App

          find . -name project.pbxproj -exec sed -i '' \
          's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = RR98G82857;/g' {} \;

      # --------------------------------
      # 6. Validate Xcode workspace
      # --------------------------------
      - name: Validate Xcode setup
        script: |
          xcodebuild -list -workspace ios/App/App.xcworkspace

      # --------------------------------
      # 7. Archive build (FIXED signing)
      # --------------------------------
      - name: Build iOS Archive
        script: |
          xcodebuild clean \
            -workspace ios/App/App.xcworkspace \
            -scheme App

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $ARCHIVE_PATH \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID

      # --------------------------------
      # 8. Export IPA
      # --------------------------------
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $ARCHIVE_PATH \
            -exportPath $BUILD_DIR \
            -exportOptionsPlist ios/App/exportOptions.plist

      # --------------------------------
      # 9. VERIFY IPA (prevents fake success)
      # --------------------------------
      - name: Validate IPA Output
        script: |
          IPA=$(find $BUILD_DIR -name "*.ipa" | head -n 1)

          if [ -z "$IPA" ]; then
            echo "ERROR: IPA NOT GENERATED"
            exit 1
          fi

          echo "IPA GENERATED: $IPA"

    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - internal
