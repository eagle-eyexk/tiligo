workflows:
  ios-build:
    name: "iOS Build"
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - tiligo_app_store_connect
        - tiligo_code_signing
        - tiligo_app_config
      vars:
        NODE_VERSION: "22"
        XCODE_VERSION: "16.1"
        COCOAPODS_VERSION: "1.15.2"
      node: $NODE_VERSION
      xcode: $XCODE_VERSION
      cocoapods: $COCOAPODS_VERSION
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      cancel_previous_builds: true
    
    scripts:
      
      - name: "Install dependencies"
        script: npm install
      
      - name: "Build web app"
        script: npm run build
      
      - name: "Sync Capacitor"
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      
      - name: "Install CocoaPods"
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..
      
      - name: "Build iOS"
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates
          cd ../..
      
      - name: "Export IPA"
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ios/ipa
          ls -la build/ios/ipa/
    
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/**/*.xcarchive
    
    publishing:
      email:
        recipients:
          - builds@tiligo.com
        notify:
          success: true
          failure: true
