workflows:
  tiligo-production:
    name: Tiligo Production

    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      app_store_connect: tiligo_asc

    environment:
      flutter: stable

      vars:
        BUNDLE_ID: com.tili-go.app
        TEAM_ID: H4QUDPK7S3

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Clean build
        script: flutter clean

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build Android
        script: |
          flutter build appbundle --release

      - name: Build iOS (automatic signing via tiligo_asc)
        script: |
          flutter build ipa --release

    artifacts:
      - build/**/outputs/**/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
