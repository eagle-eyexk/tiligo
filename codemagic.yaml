workflows:

  tiligo_autonomous_full_engine:
    name: Tiligo Autonomous Full Bootstrap CI

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # 🚀 FULL AUTONOMOUS BOOTSTRAP ENGINE
      # =========================================================
      - name: Bootstrap Everything (Flutter + iOS + Android)
        script: |
          set -e

          echo "🧠 STARTING FULL AUTONOMOUS BOOTSTRAP"

          cd $CM_BUILD_DIR

          # -----------------------------
          # 1. Ensure Flutter project exists
          # -----------------------------
          if [ ! -f pubspec.yaml ]; then
            echo "❌ No Flutter project detected → creating new one..."
            flutter create . --platforms=ios,android
          fi

          # -----------------------------
          # 2. Ensure iOS + Android exist
          # -----------------------------
          if [ ! -d ios ] || [ ! -d android ]; then
            echo "⚠️ Missing platforms → regenerating..."
            flutter create . --platforms=ios,android
          fi

          # -----------------------------
          # 3. Ensure Podfile exists
          # -----------------------------
          if [ ! -f ios/Podfile ]; then
            echo "⚠️ Podfile missing → rebuilding iOS module..."
            rm -rf ios
            flutter create . --platforms=ios
          fi

          # -----------------------------
          # 4. Install dependencies
          # -----------------------------
          echo "📦 Installing Flutter dependencies..."
          flutter clean
          flutter pub get

          # -----------------------------
          # 5. CocoaPods install
          # -----------------------------
          echo "🍫 Installing CocoaPods..."
          cd ios
          pod install
          cd ..

          echo "✅ BOOTSTRAP COMPLETE"

      # =========================================================
      # 🧪 QUALITY CHECK
      # =========================================================
      - name: Analyze & Test
        script: |
          set +e
          flutter analyze
          flutter test

      # =========================================================
      # 🚀 BUILD ENGINE
      # =========================================================
      - name: Build iOS App
        script: |
          set -e

          if [ "$CM_BRANCH" = "main" ]; then
            flutter build ipa --release
          else
            flutter build ios --debug --no-codesign
          fi

      # =========================================================
      # 🔢 VERSIONING
      # =========================================================
      - name: Auto Versioning
        script: |
          set +e
          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
