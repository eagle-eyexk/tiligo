workflows:

  tiligo_power_engine:
    name: Tiligo Power Autonomous CI/CD

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # 1. PROJECT AUTO-RECOVERY ENGINE
      # =========================================================
      - name: Auto Project Recovery
        script: |
          set -e

          echo "🧠 Checking Flutter project integrity..."

          # Case 1: No Flutter project
          if [ ! -f pubspec.yaml ]; then
            echo "❌ No pubspec.yaml found → STOP (invalid repo)"
            exit 1
          fi

          # Case 2: Missing iOS + Android
          if [ ! -d ios ] || [ ! -d android ]; then
            echo "⚠️ Missing platforms → regenerating Flutter project..."

            flutter clean
            flutter pub get
            flutter create . --platforms=ios,android
          fi

          # Case 3: Missing Podfile
          if [ ! -f ios/Podfile ]; then
            echo "⚠️ Podfile missing → rebuilding iOS module..."

            rm -rf ios
            flutter create . --platforms=ios
          fi

          echo "✅ Project structure verified"

      # =========================================================
      # 2. DEPENDENCY INSTALLATION
      # =========================================================
      - name: Install Dependencies
        script: |
          set -e

          echo "📦 Installing Flutter packages..."
          flutter clean
          flutter pub get

      # =========================================================
      # 3. iOS DEPENDENCY ENGINE (COCOAPODS SAFE MODE)
      # =========================================================
      - name: CocoaPods Safe Install
        script: |
          set -e

          echo "🍫 Validating iOS setup..."

          if [ ! -d ios ]; then
            echo "❌ iOS folder missing after recovery"
            exit 1
          fi

          if [ ! -f ios/Podfile ]; then
            echo "❌ Podfile still missing → critical failure"
            exit 1
          fi

          cd ios
          pod repo update
          pod install
          cd ..

          echo "✅ CocoaPods installed successfully"

      # =========================================================
      # 4. QUALITY CHECKS (NON-BLOCKING)
      # =========================================================
      - name: Code Analysis
        script: |
          set +e
          flutter analyze

      - name: Unit Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # 5. BUILD ENGINE (SMART MODE)
      # =========================================================
      - name: Build iOS App
        script: |
          set -e

          echo "🚀 Starting build..."

          if [ "$CM_BRANCH" = "main" ]; then
            echo "📦 Production build"
            flutter build ipa --release
          else
            echo "🧪 Dev build"
            flutter build ios --debug --no-codesign
          fi

      # =========================================================
      # 6. AUTO VERSIONING ENGINE
      # =========================================================
      - name: Versioning System
        script: |
          set +e

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

          echo "🔢 Version updated"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
