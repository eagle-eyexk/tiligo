workflows:
  ios-release:
    name: TiliGo iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      node: 18

      vars:
        BUNDLE_ID: "com.tili-go.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

      integrations:
        app_store_connect: tiligo_asc

    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Flutter dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
