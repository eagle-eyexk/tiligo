workflows:
  ios-release:
    name: TiliGo iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      node: 18

      vars:
        BUNDLE_ID: "com.tili-go.app"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    scripts:

      - name: Install Node dependencies
        script: npm install

      - name: Build frontend (Vite)
        script: npm run build

      - name: Flutter clean & dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (no signing step)
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key:
          key_id: "1PZAKU8D1T5D"
          issuer_id: "PUT_YOUR_ISSUER_ID_HERE"
          key: "$CM_ASC_KEY"
