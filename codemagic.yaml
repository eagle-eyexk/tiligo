workflows:
  ios-release:
    name: TiliGo iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      node: 18

      vars:
        BUNDLE_ID: "com.tili-go.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    scripts:

      - name: Install Node dependencies (Vite frontend)
        script: |
          npm install

      - name: Build web assets (Vite)
        script: |
          npm run build

      - name: Install Flutter dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: (Optional) Capacitor sync safe check
        script: |
          if [ -d "ios/App" ]; then
            echo "Capacitor project detected"
            npx cap sync ios || true
          else
            echo "No Capacitor project detected, skipping"
          fi

      - name: Build iOS app (no codesign, handled by Codemagic)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
