workflows:
  tiligo_smart_pipeline:
    name: Tiligo CI/CD

    integrations:
      app_store_connect: tiligo_asc

    environment:
      flutter: stable
      xcode: latest

    scripts:

      - name: Debug project root
        script: |
          echo "PWD:"
          pwd
          echo "Listing files:"
          ls -la

      - name: Verify Flutter project
        script: |
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in root" && exit 1)

      - name: Install dependencies
        script: flutter pub get

      - name: Clean build
        script: flutter clean

      - name: Install CocoaPods
        script: |
          if [ -d ios ]; then
            cd ios
            pod install --repo-update
            cd ..
          fi

      - name: Build iOS IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
