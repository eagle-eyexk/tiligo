workflows:
  ios-release:
    name: TiliGo iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      node: 18

      vars:
        BUNDLE_ID: "com.tili-go.app"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Flutter dependencies
        script: |
          flutter clean
          flutter pub get

      - name: CocoaPods install
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key:
          key_id: "S62W5AZC40R7"
          issuer_id: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
          key: "$CM_ASC_KEY"
