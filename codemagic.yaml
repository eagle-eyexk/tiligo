workflows:
  tiligo-ios:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      vars:
        NODE_VERSION: "22"
        XCODE_VERSION: "16.1"
      node: $NODE_VERSION
      xcode: $XCODE_VERSION
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          echo 'export PATH="/opt/homebrew/opt/node@22/bin:$PATH"' >> ~/.bash_profile
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          node --version

      - name: Install deps
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm install

      - name: Build web
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm run build

      - name: Setup iOS
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          rm -rf ios/
          npx cap add ios
          npx cap sync ios

      - name: Build unsigned IPA
        script: |
          cd ios/App
          
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          if [ -d "/tmp/App.xcarchive" ]; then
            mkdir -p /tmp/ipa
            
            xcodebuild \
              -exportArchive \
              -archivePath /tmp/App.xcarchive \
              -exportPath /tmp/ipa \
              -exportOptionsPlist /dev/stdin <<< '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>development</string><key>teamID</key><string>H4QUDPK7S3</string><key>signingStyle</key><string>manual</string><key>signingCertificate</key><string>-</string></dict></plist>'
            
            mkdir -p $FCI_BUILD_DIR/build/ios/ipa
            cp /tmp/ipa/*.ipa $FCI_BUILD_DIR/build/ios/ipa/ 2>/dev/null
            ls -la $FCI_BUILD_DIR/build/ios/ipa/
          fi
          cd ../..
    
    artifacts:
      - build/ios/ipa/*.ipa
