workflows:
  tiligo_ios:
    name: Tiligo iOS Production Pipeline

    integrations:
      app_store_connect: Tiligo_asc

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ~/.cocoapods
        - ios/Pods
        - ios/.symlinks

    scripts:

      # =========================================================
      # VALIDATE PROJECT
      # =========================================================
      - name: Validate Flutter Project
        script: |
          set -e
          echo "Checking project..."

          test -f pubspec.yaml || (echo "Missing pubspec.yaml" && exit 1)
          test -d lib || (echo "Missing lib folder" && exit 1)

      # =========================================================
      # FLUTTER DEPENDENCIES
      # =========================================================
      - name: Install Dependencies
        script: |
          set -e
          flutter pub get

      # =========================================================
      # COCOAPODS (SAFE INSTALL)
      # =========================================================
      - name: Ensure CocoaPods
        script: |
          set -e

          if ! command -v pod >/dev/null 2>&1; then
            echo "Installing CocoaPods..."
            sudo gem install cocoapods --no-document
          fi

          pod --version

      # =========================================================
      # IOS POD INSTALL (RELIABLE)
      # =========================================================
      - name: Install iOS Pods
        script: |
          set -e

          cd ios

          if [ ! -f Podfile ]; then
            echo "ERROR: Podfile missing. Run 'flutter create .' locally and commit ios folder."
            exit 1
          fi

          pod install --repo-update

          cd ..

      # =========================================================
      # QUALITY CHECKS (NON-BLOCKING)
      # =========================================================
      - name: Tests
        script: |
          set +e
          flutter test

      - name: Analyze
        script: |
          set +e
          flutter analyze

      # =========================================================
      # BUILD IPA
      # =========================================================
      - name: Build iOS IPA
        script: |
          set -e

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
