workflows:
  ios-release:
    name: iOS Release (Capacitor Clean Build)
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      # ------------------------------------------------------------
      # STEP 1 — Install JS dependencies (clean slate)
      # ------------------------------------------------------------
      - name: Install npm dependencies
        script: |
          set -e
          echo "=== Installing npm dependencies ==="
          npm ci --prefer-offline 2>&1 | tail -20
          echo "=== Dependencies installed ==="

      # ------------------------------------------------------------
      # STEP 2 — Verify ALL Capacitor plugins from Podfile exist
      #           Catches missing packages BEFORE sync, not after.
      # ------------------------------------------------------------
      - name: Verify Capacitor plugins
        script: |
          set -e
          echo "=== Verifying Capacitor plugins ==="
          if [ ! -f "ios/App/Podfile" ]; then
            echo "Podfile does not exist yet — skipping plugin check"
            exit 0
          fi
          grep -oP '../../node_modules/@capacitor/[^/]+' ios/App/Podfile | sort -u | while read plugin_path; do
            if [ ! -d "$plugin_path" ]; then
              plugin_name=$(echo "$plugin_path" | cut -d/ -f4)
              echo ""
              echo "=========================================="
              echo "ERROR: Missing Capacitor plugin: @capacitor/$plugin_name"
              echo "The Podfile references it, but it is not in node_modules."
              echo ""
              echo "Fix: npm install @capacitor/$plugin_name --save"
              echo "Then commit package.json and package-lock.json."
              echo "=========================================="
              exit 1
            fi
            echo "  OK: @capacitor/$(echo $plugin_path | cut -d/ -f4)"
          done
          echo "=== All Capacitor plugins verified ==="

      # ------------------------------------------------------------
      # STEP 3 — Ensure ALL Capacitor packages are installed
      #           Includes the previously-missing haptics package.
      # ------------------------------------------------------------
      - name: Ensure Capacitor packages
        script: |
          set -e
          echo "=== Ensuring Capacitor packages ==="
          npm install \
            @capacitor/core \
            @capacitor/cli \
            @capacitor/app \
            @capacitor/haptics \
            --save 2>&1
          npx cap --version
          echo "=== Capacitor CLI ready ==="

      # ------------------------------------------------------------
      # STEP 4 — Build the web application
      # ------------------------------------------------------------
      - name: Build web app
        script: |
          set -e
          echo "=== Building web app ==="
          npm run build 2>&1 | tail -30
          if [ ! -d "dist" ] && [ ! -d "build" ] && [ ! -d "www" ]; then
            echo "ERROR: No build output directory found (dist, build, or www)"
            exit 1
          fi
          echo "=== Web build complete ==="

      # ------------------------------------------------------------
      # STEP 5 — Add iOS platform (idempotent)
      # ------------------------------------------------------------
      - name: Add iOS platform
        script: |
          set -e
          echo "=== Checking iOS platform ==="
          if [ ! -d "ios" ]; then
            echo "Adding iOS platform..."
            npx cap add ios 2>&1
          else
            echo "iOS platform already exists"
          fi

      # ------------------------------------------------------------
      # STEP 6 — Sync web assets and plugins to iOS
      # ------------------------------------------------------------
      - name: Sync Capacitor to iOS
        script: |
          set -e
          echo "=== Syncing Capacitor to iOS ==="
          npx cap sync ios 2>&1 | tee "$CM_BUILD_DIR/cap-sync.log"
          echo ""
          echo "=== Sync log ==="
          cat "$CM_BUILD_DIR/cap-sync.log"
          if grep -qi "error" "$CM_BUILD_DIR/cap-sync.log"; then
            echo "ERROR: Capacitor sync reported errors"
            exit 1
          fi
          echo "=== Sync complete ==="

      # ------------------------------------------------------------
      # STEP 7 — Debug environment
      # ------------------------------------------------------------
      - name: Debug CocoaPods environment
        script: |
          set -e
          echo "=== Environment ==="
          echo "Ruby: $(ruby --version)"
          echo "Pod:  $(pod --version 2>/dev/null || echo 'NOT INSTALLED')"
          echo "PWD:  $(pwd)"
          echo ""
          if [ -f "ios/App/Podfile" ]; then
            echo "Podfile exists"
            echo "--- First 40 lines of Podfile ---"
            head -40 ios/App/Podfile
          else
            echo "ERROR: ios/App/Podfile not found"
            ls -la ios/App/ 2>/dev/null || echo "ios/App directory missing"
            exit 1
          fi

      # ------------------------------------------------------------
      # STEP 8 — Clean stale CocoaPods artifacts
      # ------------------------------------------------------------
      - name: Clean previous pod artifacts
        script: |
          set -e
          echo "=== Cleaning stale pod artifacts ==="
          cd ios/App
          rm -rf Pods Podfile.lock
          pod deintegrate 2>/dev/null || echo "No existing workspace to deintegrate"
          echo "=== Clean complete ==="

      # ------------------------------------------------------------
      # STEP 9 — CocoaPods install
      # ------------------------------------------------------------
      - name: Install CocoaPods
        script: |
          set -e
          echo "=== Installing CocoaPods ==="
          cd ios/App
          gem install cocoapods --no-document 2>&1 | tail -5
          pod install --repo-update --verbose 2>&1 | tee "$CM_BUILD_DIR/pod-install.log"
          echo ""
          echo "=== Pod install exit code: $? ==="
          if grep -qi "error\|failed\|cannot\|abort\|\[!\]" "$CM_BUILD_DIR/pod-install.log"; then
            echo ""
            echo "=== ERRORS DETECTED ==="
            grep -i "error\|failed\|cannot\|abort\|\[!\]" "$CM_BUILD_DIR/pod-install.log"
            exit 1
          fi
          echo "=== Pod install successful ==="

      # ------------------------------------------------------------
      # STEP 10 — Verify workspace exists
      # ------------------------------------------------------------
      - name: Verify workspace
        script: |
          set -e
          echo "=== Verifying workspace ==="
          if [ ! -d "ios/App/App.xcworkspace" ]; then
            echo "ERROR: App.xcworkspace not found after pod install"
            echo "Contents of ios/App:"
            ls -la ios/App/
            echo ""
            echo "--- Pod install log (last 80 lines) ---"
            tail -80 "$CM_BUILD_DIR/pod-install.log"
            exit 1
          fi
          echo "Workspace found:"
          ls -la ios/App/App.xcworkspace/
          echo "=== Verification complete ==="

      # ------------------------------------------------------------
      # STEP 11 — Set unique build number
      # ------------------------------------------------------------
      - name: Set build number
        script: |
          set -e
          echo "=== Setting build number ==="
          BUILD_NUMBER=$(( $(date +%s) - 1700000000 ))
          echo "Build number: $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" \
            ios/App/App/Info.plist 2>/dev/null || \
            echo "Info.plist not at expected path — skipping manual build number"
          echo "=== Build number set ==="

      # ------------------------------------------------------------
      # STEP 12 — Archive
      # ------------------------------------------------------------
      - name: Build iOS app (Release)
        script: |
          set -e
          echo "=== Building iOS archive ==="
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/App.xcarchive" \
            archive 2>&1 | tee "$CM_BUILD_DIR/xcodebuild.log"
          if [ ! -d "$CM_BUILD_DIR/build/App.xcarchive" ]; then
            echo "ERROR: Archive was not created"
            tail -100 "$CM_BUILD_DIR/xcodebuild.log"
            exit 1
          fi
          echo "=== Archive created ==="

      # ------------------------------------------------------------
      # STEP 13 — Export IPA
      # ------------------------------------------------------------
      - name: Export IPA
        script: |
          set -e
          echo "=== Exporting IPA ==="
          if [ -f "ios/App/ExportOptions.plist" ]; then
            EXPORT_OPTIONS="ios/App/ExportOptions.plist"
          else
            EXPORT_OPTIONS="$CM_BUILD_DIR/ExportOptions.plist"
          fi
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/App.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build" \
            -exportOptionsPlist "$EXPORT_OPTIONS" 2>&1 | tail -20
          echo "=== IPA export complete ==="

    # --------------------------------------------------------------
    # ARTIFACTS
    # --------------------------------------------------------------
    artifacts:
      - build/*.xcarchive
      - build/*.ipa
      - cap-sync.log
      - pod-install.log

    # --------------------------------------------------------------
    # PUBLISHING — TestFlight
    # --------------------------------------------------------------
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_testflight: true
        submit_to_app_store: false