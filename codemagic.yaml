workflows:
  ios-production:
    name: TiliGo iOS Auto Build

    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.tiligo.tilgo"
        APPLE_TEAM_ID: "RR98G82857"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        ARCHIVE_PATH: "$CM_BUILD_DIR/App.xcarchive"
        BUILD_DIR: "$CM_BUILD_DIR/build"

      groups:
        - code-signing

    cache:
      cache_paths:
        - node_modules
        - ~/.npm
        - ios/App/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      # ----------------------------
      # 1. Install dependencies
      # ----------------------------
      - name: Install dependencies
        script: |
          npm ci --prefer-offline --no-audit

      # ----------------------------
      # 2. Build web app
      # ----------------------------
      - name: Build web app
        script: |
          npm run build

      # ----------------------------
      # 3. FULL Capacitor reset (prevents broken iOS state)
      # ----------------------------
      - name: Capacitor reset
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          npx cap copy ios

      # ----------------------------
      # 4. Install pods
      # ----------------------------
      - name: CocoaPods install
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..

      # ----------------------------
      # 5. FORCE AUTO SIGNING + AUTO PROFILE CREATION
      # ----------------------------
      - name: Enable automatic signing
        script: |
          export DEVELOPMENT_TEAM=$APPLE_TEAM_ID

      # ----------------------------
      # 6. Verify Xcode project
      # ----------------------------
      - name: Validate Xcode project
        script: |
          xcodebuild -list -workspace ios/App/App.xcworkspace

      # ----------------------------
      # 7. ARCHIVE (AUTO CREATES PROFILES)
      # ----------------------------
      - name: Archive iOS app (auto provisioning)
        script: |
          xcodebuild clean \
            -workspace ios/App/App.xcworkspace \
            -scheme App

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $ARCHIVE_PATH \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            -allowProvisioningUpdates \
            -authenticationKeyPath $CM_APP_STORE_CONNECT_PRIVATE_KEY_PATH

      # ----------------------------
      # 8. EXPORT IPA
      # ----------------------------
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $ARCHIVE_PATH \
            -exportPath $BUILD_DIR \
            -exportOptionsPlist ios/App/exportOptions.plist

      # ----------------------------
      # 9. VALIDATE OUTPUT
      # ----------------------------
      - name: Validate IPA
        script: |
          IPA=$(find $BUILD_DIR -name "*.ipa" | head -n 1)

          if [ -z "$IPA" ]; then
            echo "ERROR: IPA NOT GENERATED"
            exit 1
          fi

          echo "IPA CREATED: $IPA"

    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - internal
