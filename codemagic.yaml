workflows:
  ios-release:
    name: iOS Release (Capacitor)
    max_build_duration: 60

    environment:
      vars:
        BUNDLE_ID: com.tiligo.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app

      xcode: 16.4

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Ensure correct workspace
        script: |
          ls ios/App

      - name: Build IPA (archive)
        script: |
          xcodebuild \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true