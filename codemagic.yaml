workflows:
  ios-release:
    name: TiliGo iOS Deterministic Build
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        APP_NAME: "TiliGo"
        BUNDLE_ID: "com.tiligo.tilgo"
        TEAM_ID: "RR98G82857"
        WORKSPACE: "ios/App/App.xcworkspace"
        SCHEME: "App"

      groups:
        - code-signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:

      # --------------------------------------------------
      # 1. HARD RESET (ELIMINATES ALL DRIFT)
      # --------------------------------------------------
      - name: Clean workspace completely
        script: |
          echo "Removing all iOS artifacts..."
          rm -rf ios/App
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/CocoaPods

      # --------------------------------------------------
      # 2. INSTALL DEPENDENCIES
      # --------------------------------------------------
      - name: Install Node dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      # --------------------------------------------------
      # 3. REBUILD IOS FROM CAPACITOR (SOURCE OF TRUTH)
      # --------------------------------------------------
      - name: Recreate iOS platform deterministically
        script: |
          npx cap init TiliGo com.tiligo.tilgo --web-dir=dist || true
          npx cap add ios || true
          npx cap sync ios

      # --------------------------------------------------
      # 4. FORCE CLEAN POD INSTALL
      # --------------------------------------------------
      - name: Install CocoaPods clean
        script: |
          cd ios/App
          pod deintegrate || true
          pod cache clean --all || true
          pod install --repo-update
          cd ../..

      # --------------------------------------------------
      # 5. VERIFY PROJECT INTEGRITY
      # --------------------------------------------------
      - name: Validate Xcode workspace
        script: |
          xcodebuild -list -workspace ios/App/App.xcworkspace

      # --------------------------------------------------
      # 6. SIGNING NORMALIZATION (CRITICAL FIX LAYER)
      # --------------------------------------------------
      - name: Normalize signing configuration
        script: |
          PBX=ios/App/App.xcodeproj/project.pbxproj

          # Force automatic signing only
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' $PBX || true

          # Remove hardcoded provisioning profiles
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;//g' $PBX || true

          # Fix team ID
          sed -i '' "s/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = ${TEAM_ID};/g" $PBX || true

          # Fix bundle id drift
          sed -i '' "s/com.tiligo.tiligo/com.tiligo.tilgo/g" $PBX || true

      # --------------------------------------------------
      # 7. DETERMNISTIC ARCHIVE (NO LOCAL SIGNING)
      # --------------------------------------------------
      - name: Archive iOS app
        script: |
          set -o pipefail

          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            -allowProvisioningUpdates

      # --------------------------------------------------
      # 8. EXPORT IPA
      # --------------------------------------------------
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/App/exportOptions.plist

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true