workflows:
  ios-build:
    name: "iOS Build"
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - tiligo_app_store_connect
        - tiligo_code_signing
        - tiligo_app_config
      vars:
        NODE_VERSION: "22"
        XCODE_VERSION: "16.1"
        COCOAPODS_VERSION: "1.15.2"
      node: $NODE_VERSION
      xcode: $XCODE_VERSION
      cocoapods: $COCOAPODS_VERSION
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      cancel_previous_builds: true
    
    scripts:
      
      - name: "Install dependencies"
        script: npm install
      
      - name: "Build web app"
        script: npm run build
      
      - name: "Sync Capacitor"
        script: npx cap sync ios 2>/dev/null || npx cap add ios && npx cap sync ios
      
      - name: "Install CocoaPods"
        script: |
          cd ios/App 2>/dev/null || cd ios
          pod install --repo-update 2>/dev/null || pod install
          cd ../..
      
      - name: "Build iOS"
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          SCHEME="App"
          cd $(dirname "$WORKSPACE")
          xcodebuild \
            -workspace "$(basename "$WORKSPACE")" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates 2>/dev/null || \
          xcodebuild \
            -workspace "$(basename "$WORKSPACE")" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates
          cd ../..
      
      - name: "Export IPA"
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/exportOptions.plist 2>/dev/null || \
          mkdir -p build/ios/ipa && echo "IPA export skipped - check archive"
          ls -la build/ios/ipa/ 2>/dev/null || echo "No IPA"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/**/*.xcarchive
    
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
      
      email:
        recipients:
          - builds@tiligo.com
        notify:
          success: true
          failure: true
