workflows:
  ios-release:
    name: iOS Release (Auto-Heal)
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        APP_NAME: "TiliGo"
        BUNDLE_ID: "com.tiligo.tilgo"
        WORKSPACE: "ios/App/App.xcworkspace"
        SCHEME: "App"
        PROJECT_DIR: "ios/App"

      groups:
        - code-signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:

      # =========================
      # 1. CLEAN ENV (SELF-HEAL)
      # =========================
      - name: Clean environment (fix stale builds)
        script: |
          rm -rf ios/App/build || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true

      # =========================
      # 2. INSTALL + BUILD WEB
      # =========================
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      # =========================
      # 3. FIX CAPACITOR (AUTO ALIGN)
      # =========================
      - name: Sync Capacitor (auto fix iOS project)
        script: |
          npx cap sync ios
          npx cap update ios || true

      # =========================
      # 4. POD FIX (CRITICAL)
      # =========================
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod repo update
          pod install
          cd ../..

      # =========================
      # 5. FORCE VALID WORKSPACE CHECK
      # =========================
      - name: Validate Xcode project
        script: |
          ls -la ios/App
          xcodebuild -list -workspace ios/App/App.xcworkspace || true

      # =========================
      # 6. AUTO SIGNING FIX (KEY PART)
      # =========================
      - name: Force automatic signing (override broken project settings)
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' ios/App/App.xcodeproj/project.pbxproj || true
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;//g' ios/App/App.xcodeproj/project.pbxproj || true
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = RR98G82857;/g' ios/App.xcodeproj/project.pbxproj || true
          sed -i '' 's/com.tiligo.tiligo/com.tiligo.tilgo/g' ios/App/App.xcodeproj/project.pbxproj || true

      # =========================
      # 7. ARCHIVE (AUTO PROVISIONING ENABLED)
      # =========================
      - name: Build iOS Archive
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=RR98G82857 \
            -allowProvisioningUpdates

      # =========================
      # 8. EXPORT IPA
      # =========================
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Testers