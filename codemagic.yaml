workflows:
  ios-release:
    name: Pellazgo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: pellazgo_asc

    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.pellazgo.pellazgo"
        APP_NAME: "Pellazgo"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APPLE_TEAM_ID: "H4QUDPK7S3"
        CERT_PASSWORD: "xbGsHVMw"

    scripts:
      # ──────────────────────────────────────────────────────────────
      # 1. Install provisioning profile
      # ──────────────────────────────────────────────────────────────
      - name: Install provisioning profile
        script: |
          echo "📱 Installing provisioning profile..."
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp signing/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "✅ Provisioning profiles installed:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      # ──────────────────────────────────────────────────────────────
      # 2. Set up certificate in keychain
      # ──────────────────────────────────────────────────────────────
      - name: Set up certificate
        script: |
          echo "🔐 Setting up certificate..."
          security create-keychain -p build123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build123 build.keychain
          security import signing/*.p12 -k build.keychain -P "$CERT_PASSWORD" -A
          security set-keychain-settings -t 3600 -l build.keychain
          echo "✅ Certificate installed"

      # ──────────────────────────────────────────────────────────────
      # 3. Fix Xcode project to use AUTOMATIC signing
      # ──────────────────────────────────────────────────────────────
      - name: Fix Xcode project signing
        script: |
          echo "🔧 Setting Xcode project to AUTOMATIC signing..."
          python3 -c "
          import re
          import os

          PROJECT_FILE = 'ios/App/App.xcodeproj/project.pbxproj'

          if not os.path.exists(PROJECT_FILE):
              print('❌ Project file not found')
              exit(1)

          with open(PROJECT_FILE, 'r') as f:
              content = f.read()

          # Set to Automatic signing
          content = re.sub(r'CODE_SIGN_STYLE = Manual;', 'CODE_SIGN_STYLE = Automatic;', content)
          content = re.sub(r'CODE_SIGN_STYLE = .*?;', 'CODE_SIGN_STYLE = Automatic;', content)

          # Remove manual profile specifier
          content = re.sub(r'PROVISIONING_PROFILE_SPECIFIER = .*?;', '', content)

          # Set DEVELOPMENT_TEAM
          content = re.sub(r'DEVELOPMENT_TEAM = .*?;', 'DEVELOPMENT_TEAM = H4QUDPK7S3;', content)

          # Update bundle ID
          content = re.sub(r'PRODUCT_BUNDLE_IDENTIFIER = .*?;', 'PRODUCT_BUNDLE_IDENTIFIER = com.pellazgo.pellazgo;', content)

          with open(PROJECT_FILE, 'w') as f:
              f.write(content)

          print('✅ Project set to Automatic signing')
          "

      # ──────────────────────────────────────────────────────────────
      # 4. Install dependencies & build web app
      # ──────────────────────────────────────────────────────────────
      - name: Install dependencies & build web app
        script: |
          echo "📦 Installing dependencies..."
          npm ci --prefer-offline
          echo "🏗️ Building web app..."
          npm run build

      # ──────────────────────────────────────────────────────────────
      # 5. Sync Capacitor
      # ──────────────────────────────────────────────────────────────
      - name: Sync Capacitor
        script: |
          echo "🔄 Syncing Capacitor..."
          npx cap sync ios
          if [ -f "capacitor.config.json" ]; then
            cp capacitor.config.json ios/App/App/
            echo "✅ capacitor.config.json copied"
          fi

      # ──────────────────────────────────────────────────────────────
      # 6. Install CocoaPods
      # ──────────────────────────────────────────────────────────────
      - name: Install CocoaPods
        script: |
          echo "📦 Installing CocoaPods..."
          cd ios/App && pod install --repo-update

      # ──────────────────────────────────────────────────────────────
      # 7. Build archive (AUTOMATIC signing - NO manual profile)
      # ──────────────────────────────────────────────────────────────
      - name: Build archive
        script: |
          echo "🏗️ Building archive..."
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            archive

      # ──────────────────────────────────────────────────────────────
      # 8. Export IPA
      # ──────────────────────────────────────────────────────────────
      - name: Export IPA
        script: |
          echo "📦 Exporting IPA..."
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID

    artifacts:
      - build/ipa/*.ipa
      - build/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
