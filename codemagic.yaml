workflows:
  tiligo-ios:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      vars:
        NODE_VERSION: "22"
        XCODE_VERSION: "16.1"
      node: $NODE_VERSION
      xcode: $XCODE_VERSION
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
      cancel_previous_builds: true
    
    scripts:
      - name: Install Node 22
        script: |
          brew install node@22
          echo 'export PATH="/opt/homebrew/opt/node@22/bin:$PATH"' >> ~/.bash_profile
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          node --version

      - name: Install deps
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm install

      - name: Build web
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          npm run build

      - name: Setup iOS
        script: |
          export PATH="/opt/homebrew/opt/node@22/bin:$PATH"
          rm -rf ios/
          npx cap add ios
          npx cap sync ios
          echo "=== iOS files ==="
          ls -la ios/App/

      - name: Create export options
        script: |
          cat > ios/App/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.tiligo.app</key>
                  <string>Tiligo App Store</string>
              </dict>
          </dict>
          </plist>
          PLIST

      - name: Resolve package dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies
          cd ../..

      - name: Build archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="H4QUDPK7S3"
          cd ../..

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/exportOptions.plist
          ls -la build/ios/ipa/
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY
        key_id: "2H8MJ5ZP26"
        issuer_id: "6d7acece-2356-43c3-9946-6fd2cda5bf7d"
        submit_to_testflight: true
      
      email:
        recipients:
          - agentextern@gmail.com
        notify:
          success: true
          failure: true
