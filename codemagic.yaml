workflows:
  ios-release:
    name: TiliGo iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      node: 18

      vars:
        BUNDLE_ID: "com.tili-go.app"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tili-go.app

    scripts:

      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build

      - name: Flutter clean + get
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: true
