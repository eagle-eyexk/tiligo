workflows:
  ios-release:
    name: iOS Release

    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: tiligo_asc

    environment:
      node: 22
      xcode: latest
      cocoapods: default

      vars:
        TEAM_ID: "RR98G82857"
        BUNDLE_ID: "com.tiligo.tilgo"

      groups:
        - code-signing   # ONLY for API key, NOT certificates

    scripts:
      - name: Build
        script: |
          npm ci
          npm run build

      - name: iOS sync
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Install pods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Archive
        script: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/app.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID \
            -allowProvisioningUpdates

    artifacts:
      - $CM_BUILD_DIR/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
