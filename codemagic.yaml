workflows:
  ios-release:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: tiligo_asc
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Setup
        script: |
          npm install
          npm run build
      - name: iOS Platform
        script: |
          npx cap add ios 2>/dev/null || true
          npx cap sync ios 2>/dev/null || true
      - name: Create Podfile
        script: |
          mkdir -p ios/App
          cat > ios/App/Podfile << 'POD'
          platform :ios, '13.0'
          use_frameworks!
          target 'App' do
          end
          POD
      - name: Install Pods
        script: cd ios/App && pod install && cd ../..
      - name: Export Options
        script: |
          cat > ios/App/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath ../../build/ios/archive/App.xcarchive DEVELOPMENT_TEAM=H4QUDPK7S3 CODE_SIGN_STYLE=Automatic -allowProvisioningUpdates
          xcodebuild -exportArchive -archivePath ../../build/ios/archive/App.xcarchive -exportPath ../../build/ios/ipa -exportOptionsPlist exportOptions.plist -allowProvisioningUpdates
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
