workflows:
  ios-release:
    name: Tiligo TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: tiligo_asc
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install
        script: npm install
      - name: Build Web
        script: npm run build
      - name: iOS Platform
        script: npx cap add ios && npx cap sync ios
      - name: Export Options
        script: |
          cat > ios/App/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>H4QUDPK7S3</string>
          </dict>
          </plist>
          PLIST
      - name: Pod Install
        script: cd ios/App && pod install && cd ../..
      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath ../../build/ios/archive/App.xcarchive CODE_SIGN_STYLE=Manual -allowProvisioningUpdates
          xcodebuild -exportArchive -archivePath ../../build/ios/archive/App.xcarchive -exportPath ../../build/ios/ipa -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
