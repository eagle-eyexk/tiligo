name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx cap sync ios
      - run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release -archivePath /tmp/app.xcarchive archive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
      - run: |
          mkdir -p build
          cat > /tmp/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>method</key><string>debugging</string>
          <key>teamID</key><string>H4QUDPK7S3</string>
          <key>signingCertificate</key><string>-</string>
          <key>signingStyle</key><string>manual</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath /tmp/app.xcarchive -exportPath build -exportOptionsPlist /tmp/export.plist
          ls -la build/
      - name: Upload to TestFlight
        run: |
          IPA=$(find build -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          echo "$APPSTORE_PRIVATE_KEY" > /tmp/key.p8
          xcrun altool --upload-app --file "$IPA" --type ios --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID" --apiKeyPath /tmp/key.p8
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}