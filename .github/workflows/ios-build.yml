name: iOS Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node version
        run: |
          node --version
          npm --version
          echo "NODE VERSION CHECK"
          node -e "const v=process.version; if(!v.startsWith('v22')){console.log('Wrong Node!'); process.exit(1)} else {console.log('Node 22 OK')}"

      - name: Install ALL dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar

      - name: Build web app
        run: npm run build

      - name: Setup iOS from scratch
        run: |
          rm -rf ios/
          npx cap add ios
          
          cat > ios/App/Podfile << 'PODFILE'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'
          platform :ios, '13.0'
          use_frameworks!
          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorHaptics', :path => '../../node_modules/@capacitor/haptics'
            pod 'CapacitorKeyboard', :path => '../../node_modules/@capacitor/keyboard'
            pod 'CapacitorStatusBar', :path => '../../node_modules/@capacitor/status-bar'
          end
          target 'App' do
            capacitor_pods
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
            capacitor_post_install(installer)
          end
          PODFILE
          
          npx cap sync ios

      - name: Pod install
        run: |
          cd ios/App
          pod install --repo-update
          cd ../..

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO
          cd ../..

      - name: Export IPA
        run: |
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/exportOptions.plist 2>/dev/null || true
          ls -la build/ios/ipa/

      - uses: actions/upload-artifact@v4
        with:
          name: tiligo-ios
          path: build/ios/ipa/*.ipa
