name: iOS Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm install @capacitor/ios

      - run: npm run build

      - run: npx cap sync ios

      - name: Pod install
        run: |
          cd ios/App
          pod install --repo-update
          cd ../..

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates
          cd ../..

      - name: Export IPA
        run: |
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/exportOptions.plist 2>/dev/null || true
          ls -la build/ios/ipa/

      - uses: actions/upload-artifact@v4
        with:
          name: tiligo-ios
          path: build/ios/ipa/*.ipa
