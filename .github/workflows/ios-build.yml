name: iOS Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: |
          echo "=== Installing iOS platform ==="
          npm install @capacitor/ios @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar

      - run: npm run build

      - name: Setup iOS project
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          
          if [ ! -f "ios/App/Podfile" ]; then
            mkdir -p ios/App
            cat > ios/App/Podfile << 'PODFILE'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'
          platform :ios, '13.0'
          use_frameworks!
          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorHaptics', :path => '../../node_modules/@capacitor/haptics'
            pod 'CapacitorKeyboard', :path => '../../node_modules/@capacitor/keyboard'
            pod 'CapacitorStatusBar', :path => '../../node_modules/@capacitor/status-bar'
          end
          target 'App' do
            capacitor_pods
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
            capacitor_post_install(installer)
          end
          PODFILE
          fi
          
          npx cap sync ios

      - name: Pod install
        run: |
          cd ios/App
          pod repo update 2>/dev/null || true
          pod deintegrate 2>/dev/null || true
          pod install --repo-update || pod install || pod install --verbose
          cd ../..

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          cd ../..

      - name: Export IPA
        run: |
          mkdir -p build/ios/ipa
          cat > ios/App/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>0000000000</string>
          </dict>
          </plist>
          PLIST
          
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/App/exportOptions.plist 2>/dev/null || true
          
          ls -la build/ios/ipa/ 2>/dev/null || echo "IPA export skipped"

      - uses: actions/upload-artifact@v4
        with:
          name: tiligo-ios
          path: |
            build/ios/ipa/*.ipa
            ios/App/build/*.xcarchive
