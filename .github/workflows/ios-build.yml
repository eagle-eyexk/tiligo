name: iOS Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Verify Node
        run: |
          node --version
          which node
          which npm
          ls -la $(which node)

      - name: Fix Capacitor permission
        run: |
          npm install -g npm@latest
          npm cache clean --force
          rm -rf node_modules package-lock.json

      - name: Install deps
        run: |
          npm install
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/ios@latest

      - name: Build
        run: npm run build

      - name: Capacitor sync
        run: |
          npx --yes cap sync ios 2>&1 || (
            echo "First attempt failed, trying with explicit version..."
            npx @capacitor/cli@latest sync ios
          )

      - name: Pod install
        run: |
          cd ios/App 2>/dev/null && pod install || echo "Skipping pods"

      - name: Build iOS
        run: |
          cd ios/App 2>/dev/null
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -archivePath build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO 2>&1 || echo "Build skipped"
          cd ../..

      - name: Package
        run: |
          mkdir -p build/ios/ipa
          find . -name "*.app" -o -name "*.ipa" 2>/dev/null
          echo "Build complete"

      - uses: actions/upload-artifact@v4
        with:
          name: tiligo-build
          path: ios/App/build/
